seed: 42
deterministic: true

model:
  name: llava_next
  backbone: vicuna-7b

training:
  batch_size: 32
  grad_accum: 4
  lr: 5e-5

# ✅ Ablation: ONLY sparse gating enabled
neurobalance:
  gating:
    enabled: true
    target_density: 0.15

  attention:
    enabled: false
    beta: 1.0

  injection:
    enabled: false
    gamma: 0.0
